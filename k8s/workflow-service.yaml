apiVersion: v1
kind: Service
metadata:
  name: workflow-service
  namespace: habit-tracker
spec:
  selector:
    app: workflow-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-service
  namespace: habit-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-service
  template:
    metadata:
      labels:
        app: workflow-service
    spec:
      containers:
        - name: workflow-service
          image: habit-tracker/workflow-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ConnectionStrings__WorkflowDb
              value: "Host=workflow-db;Database=workflowdb;Username=postgres;Password=$(DB_PASSWORD)"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: habit-tracker-secrets
                  key: WORKFLOW_DB_PASSWORD
            - name: Services__CoreApiUrl
              valueFrom:
                configMapKeyRef:
                  name: habit-tracker-config
                  key: CORE_API_URL
            - name: Services__UsersServiceUrl
              valueFrom:
                configMapKeyRef:
                  name: habit-tracker-config
                  key: USERS_SERVICE_URL
            - name: Services__NotificationServiceUrl
              valueFrom:
                configMapKeyRef:
                  name: habit-tracker-config
                  key: NOTIFICATION_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
