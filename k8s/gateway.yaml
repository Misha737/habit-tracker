apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: habit-tracker
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: habit-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: habit-tracker/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ReverseProxy__Clusters__core-cluster__Destinations__core-api__Address
              value: "http://core-api:8080/"
            - name: ReverseProxy__Clusters__users-cluster__Destinations__users-service__Address
              value: "http://users-service:8080/"
            - name: ReverseProxy__Clusters__workflow-cluster__Destinations__workflow-service__Address
              value: "http://workflow-service:8080/"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
